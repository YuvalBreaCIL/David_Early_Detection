  transforms:
    load_numpy:
      _target_: my_transforms.LoadNumpyd
      keys: [micro, macro]
        # - micro
        # - macro
    add_channel:
      _target_: monai.transforms.EnsureChannelFirstd #monai.transforms.AddChanneld
      keys: [micro, macro]
        # - micro
        # - macro
      channel_dim: "no_channel"
    resize_micro:
      _target_: monai.transforms.Resized
      keys: [micro]
        # - micro
      spatial_size: [24,24]
        # - 24
        # - 24
    # resize_macro:
    #   _target_: monai.transforms.Resized
    #   keys:
    #     - macro
    #   spatial_size: [128,128]
    #     # - 128
    #     # - 128
    scale_intensity:
      _target_: monai.transforms.ScaleIntensityd
      keys: [micro, macro]
        # - micro
        # - macro
    norm_intensity:
      _target_: monai.transforms.NormalizeIntensityd
      keys: [micro, macro]

    ensure_type:
      _target_: monai.transforms.EnsureTyped
      keys: [micro, macro]
        # - micro
        # - macro

  dataset:
    class_name: monai.data.Dataset
  batch_size: 1

  augmentation:
    rand_flip:
      # _target_: monai.transforms.RandFlipd
      _target_: aug_record_transforms.RecordRandFlipd
      keys: [micro, macro]
      prob: 0.5
      spatial_axis: 1

    rand_rotate:
      _target_: aug_record_transforms.RecordRandRotated
      keys: [micro, macro]
      prob: 0.3
      range_x: 0.17

    rand_adjust_contrast:
      _target_: monai.transforms.RandAdjustContrastd
      keys: [micro, macro]
      prob: 0.3
      gamma: [0.85, 1.15]
