transforms:
  micro:
    # the time of the scan in which we're looking
    slice_from_array:
      _target_: my_transforms.SliceFromArray
      dim: 0
      slice_num: 1
    maximum_intensity_projection:
      _target_: my_transforms.MaximumIntensityProjection
      axis: 0
    
  macro:
    # the time of the scan in which we're looking
    slice_from_array:
      _target_: my_transforms.SliceFromArray
      dim: 0
      slice_num: 1
    maximum_intensity_projection:
      _target_: my_transforms.MaximumIntensityProjection
      axis: 0

  micro_macro_subcm:
    # the time of the scan in which we're looking
    slice_from_array:
      _target_: my_transforms.SliceFromArray
      dim: 0
      slice_num: 0
    maximum_intensity_projection:
      _target_: my_transforms.MaximumIntensityProjection
      axis: 0

  
